name: Validate ODC schema and examples

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install validation and browser-test dependencies
        run: npm ci

      - name: Install Chromium for UI verification
        run: npx playwright install --with-deps chromium

      - name: Regenerate committed public datasets
        run: npm run generate

      - name: Validate schema files
        run: |
          # Schema syntax check
          node -e "JSON.parse(require('node:fs').readFileSync('schema/odc.schema.json', 'utf8'))"

          # Validate each catalog file is loadable JSON
          for f in schema/categories/*.json; do
            echo "Checking $f"
            node -e "JSON.parse(require('node:fs').readFileSync('$f', 'utf8'))"
          done

          # Validate enums
          node -e "JSON.parse(require('node:fs').readFileSync('schema/enums/quantitative_scales.json', 'utf8'))"

          # Validate the independent public road-rule schema and dataset
          node -e "JSON.parse(require('node:fs').readFileSync('schema/road-rules/road-rule-profile.schema.json', 'utf8'))"
          node -e "JSON.parse(require('node:fs').readFileSync('data/road-rules/obligations.json', 'utf8'))"

      - name: Validate every example document against schema
        run: node tools/validate-json-schemas.mjs

      - name: Verify element_id references exist in catalog
        run: node tools/check-references.mjs

      - name: Validate public road-rule profile and compatibility lock
        run: node tools/check-road-rules.mjs

      - name: Verify JSON, CSV, and Markdown export parity
        run: node tools/check-road-rule-exports.mjs

      - name: Enforce public/private boundary
        run: node tools/check-public-boundary.mjs

      - name: Verify desktop and mobile UI flows
        run: npm run test:ui

      - name: Upload UI evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openodc-ui-evidence
          path: |
            test-results/evidence
            test-results/report
          if-no-files-found: ignore

      - name: Report source link health
        run: node tools/check-source-links.mjs
        continue-on-error: true
