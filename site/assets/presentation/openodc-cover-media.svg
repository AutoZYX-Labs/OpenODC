<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="460" viewBox="0 0 1600 460" role="img" aria-labelledby="title desc">
  <title id="title">OpenODC cover media placeholder</title>
  <desc id="desc">A stylized aerial road scene with automated-driving object boxes.</desc>
  <defs>
    <linearGradient id="tree" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6e7e63"/>
      <stop offset=".5" stop-color="#334735"/>
      <stop offset="1" stop-color="#7c8a67"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5c6268"/>
      <stop offset=".5" stop-color="#78818a"/>
      <stop offset="1" stop-color="#545a60"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0d223a" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="1600" height="460" fill="#1c2c32"/>
  <rect y="0" width="1600" height="74" fill="url(#tree)"/>
  <rect y="386" width="1600" height="74" fill="url(#tree)"/>
  <rect y="78" width="1600" height="304" fill="url(#road)"/>
  <rect y="118" width="1600" height="54" fill="#8097a3" opacity=".72"/>
  <rect y="214" width="1600" height="46" fill="#9dbcbf" opacity=".65"/>
  <rect y="302" width="1600" height="50" fill="#7d8b76" opacity=".7"/>
  <g stroke="#ffffff" stroke-width="4" stroke-dasharray="42 34" opacity=".62">
    <line x1="0" y1="102" x2="1600" y2="102"/>
    <line x1="0" y1="191" x2="1600" y2="191"/>
    <line x1="0" y1="283" x2="1600" y2="283"/>
    <line x1="0" y1="362" x2="1600" y2="362"/>
  </g>
  <rect x="792" y="0" width="24" height="460" fill="#c4ced2" opacity=".7"/>
  <rect x="770" y="0" width="3" height="460" fill="#f2f5f4" opacity=".65"/>
  <rect x="834" y="0" width="3" height="460" fill="#f2f5f4" opacity=".65"/>
  <g font-family="Source Han Sans SC, Noto Sans SC, Arial, sans-serif" font-size="18" font-weight="800" filter="url(#shadow)">
    <g fill="none" stroke="#00d454" stroke-width="6">
      <rect x="124" y="126" width="94" height="30"/>
      <rect x="402" y="302" width="160" height="44"/>
      <rect x="696" y="136" width="118" height="36"/>
      <rect x="922" y="252" width="210" height="46"/>
      <rect x="1290" y="316" width="150" height="42"/>
    </g>
    <g fill="#00d454" opacity=".2">
      <rect x="124" y="126" width="94" height="30"/>
      <rect x="402" y="302" width="160" height="44"/>
      <rect x="696" y="136" width="118" height="36"/>
      <rect x="922" y="252" width="210" height="46"/>
      <rect x="1290" y="316" width="150" height="42"/>
    </g>
    <g fill="none" stroke="#ffd91a" stroke-width="5">
      <rect x="302" y="174" width="70" height="28"/>
      <rect x="604" y="262" width="78" height="28"/>
      <rect x="1172" y="138" width="78" height="28"/>
      <rect x="1448" y="222" width="72" height="28"/>
    </g>
    <g fill="#ffffff" opacity=".9">
      <text x="225" y="151">ODC-141</text>
      <text x="568" y="336">51.2 km/h</text>
      <text x="820" y="162">manual</text>
      <text x="1138" y="286">boundary</text>
      <text x="1260" y="160">official</text>
      <text x="1320" y="348">exit</text>
